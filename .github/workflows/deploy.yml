name: Deploy site to GitHub Pages

# Деплой при каждом push в main + ручной запуск из вкладки Actions
on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, необходимые официальному деплою в GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать параллельные деплои; новый отменяет предыдущий
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest   # Swift предустановлен; среда близка к локальной
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Запускаем сам исполняемый таргет — он и есть генератор сайта.
      # publish CLI в CI не нужен: `swift run` делает то же, что `publish generate`.
      - name: Generate site (Publish)
        run: swift run SergeyMingalev

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Публикуем сгенерированную папку Output как артефакт Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
